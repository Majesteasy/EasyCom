name: Deploy EasyCom to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Make webhook URL from secrets
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: |
          sed -i "s|%%MAKE_WEBHOOK_URL%%|${MAKE_WEBHOOK_URL}|g" index.html
          echo "URL webhook Make injectee depuis GitHub Secrets"

      - name: Verify no placeholder remains
        run: |
          if grep -q "%%MAKE_WEBHOOK_URL%%" index.html; then
            echo "ERREUR: secret MAKE_WEBHOOK_URL manquant dans les GitHub Secrets"
            exit 1
          fi
          echo "OK: aucun placeholder en dur dans le fichier deploye"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
