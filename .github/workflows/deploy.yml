name: Deploy EasyCom to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API keys from secrets
        env:
          INFOMANIAK_API_KEY: ${{ secrets.INFOMANIAK_API_KEY }}
        run: |
          sed -i "s|%%INFOMANIAK_API_KEY%%|${INFOMANIAK_API_KEY}|g" index.html
          echo "Cle Infomaniak AI injectee depuis GitHub Secrets"

      - name: Verify no placeholder remains
        run: |
          if grep -q "%%INFOMANIAK_API_KEY%%" index.html; then
            echo "ERREUR: secret INFOMANIAK_API_KEY manquant dans les GitHub Secrets"
            exit 1
          fi
          echo "OK: aucune cle en dur dans le fichier deploye"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
